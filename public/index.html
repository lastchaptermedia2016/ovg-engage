<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVG Engage</title>
  </head>
  <body class="bg-black m-0 p-0">
    <!-- Full-page looping video background -->
    <video
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      class="fixed inset-0 w-full h-full object-cover -z-10"
    >
      <source src="/videos/video-bg.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <!-- Light overlay (adjust /15 to /30 or remove if too dark) -->
    <div class="fixed inset-0 bg-black/15 -z-10 pointer-events-none"></div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
